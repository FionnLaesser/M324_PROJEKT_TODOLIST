spring.datasource.url=jdbc:h2:mem:todo_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

app.jwt.secret=01234567890123456789012345678901234567890123456789
app.jwt.expiration-minutes=30
app.cors.allowed-origins=http://localhost:5173
app.keycloak.issuer-uri=http://localhost:8081/realms/todo-app
app.keycloak.jwk-set-uri=http://localhost:8081/realms/todo-app/protocol/openid-connect/certs
app.keycloak.client-id=todo-frontend
