
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/todo_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:todo_user}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
app.keycloak.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/todo-app}
app.keycloak.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/todo-app/protocol/openid-connect/certs}
app.keycloak.client-id=${KEYCLOAK_CLIENT_ID:todo-frontend}

server.error.include-message=never
server.error.include-stacktrace=never
