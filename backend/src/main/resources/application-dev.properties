spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

spring.datasource.url=${DEV_DB_URL:jdbc:h2:mem:todo_dev;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${DEV_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DEV_DB_USERNAME:sa}
spring.datasource.password=${DEV_DB_PASSWORD:}

app.jwt.secret=${JWT_SECRET:local-dev-jwt-secret-change-me-12345678901234567890}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
app.keycloak.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/todo-app}
app.keycloak.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/todo-app/protocol/openid-connect/certs}
app.keycloak.client-id=${KEYCLOAK_CLIENT_ID:todo-frontend}
