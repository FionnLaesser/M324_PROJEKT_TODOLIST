services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: todo_app
      MYSQL_USER: todo_user
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
    ports:
      - "3307:3306"
    volumes:
      - mysql_app_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.3
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
    volumes:
      - keycloak_app_data:/opt/keycloak/data
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: m324_backend:local
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/todo_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: todo_user
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
      KEYCLOAK_ISSUER_URI: http://localhost:8081/realms/todo-app
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/todo-app/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_ID: todo-frontend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_KEYCLOAK_URL: http://localhost:8081
        VITE_KEYCLOAK_REALM: todo-app
        VITE_KEYCLOAK_CLIENT_ID: todo-frontend
    image: m324_frontend:local
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  keycloak-demo:
    image: nginx:alpine
    ports:
      - "5174:80"
    volumes:
      - ./keycloak-demo:/usr/share/nginx/html:ro
    depends_on:
      - keycloak
      - backend
    restart: unless-stopped

volumes:
  mysql_app_data:
  keycloak_app_data:
